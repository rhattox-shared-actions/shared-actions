name: "Install Build Tools"
description: "Install build tools"

outputs:
  languages:
    description: "The languages to install"
    value: ${{ steps.language.outputs.greeting }}

runs:
  using: composite
  steps:
    - name: Check for dotfile with the desired language
      id: check-install-tools
      shell: bash
      run: |-
        # Maven
        if [ -f .maven ]; then
          echo "maven installation requested"
          echo "maven=true" >> $GITHUB_OUTPUT
        fi

        # Java
        if [ -f .java ]; then
          echo "java installation requested"
        fi

        # Node
        if [ -f .node ]; then
          echo "node installation requested"
        fi

        # Python
        if [ -f .python ]; then
          echo "python installation requested"
        fi

    - name: Get Maven Version
      id: get-maven-version
      if: steps.check-install-tools.outputs.maven == 'true'
      shell: bash
      run: |-
        #Debug
        maven-version="$(cat .maven-version)"
        echo "MAVEN VERSION = ${maven_version}"

        echo "maven-version=${maven_version}" >> $GITHUB_OUTPUT

    - name: Install Maven
      id: install-maven
      if: steps.check-install.outputs.maven == 'true'
      uses: rhattox-shared-actions/shared-actions/actions/tools/maven@main
      with:
        maven-version: ${{ steps.get-maven-version.outputs.maven-version }}
